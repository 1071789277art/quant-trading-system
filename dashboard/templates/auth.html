<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 稳赢量化交易系统</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #4facfe;
            --green: #00d68f;
            --red: #ff4d6a;
            --border: #30363d;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }
        .auth-brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .auth-brand h1 i {
            color: var(--accent);
            margin-right: 8px;
        }
        .auth-brand p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .auth-tab:hover { color: var(--text-primary); }
        .auth-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(79,172,254,0.15);
        }
        .form-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        .auth-btn {
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .auth-btn:hover { opacity: 0.9; }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .alert-box {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            margin-bottom: 16px;
        }
        .alert-danger {
            background: rgba(255,77,106,0.1);
            border: 1px solid rgba(255,77,106,0.3);
            color: var(--red);
        }
        .alert-success {
            background: rgba(0,214,143,0.1);
            border: 1px solid rgba(0,214,143,0.3);
            color: var(--green);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-brand">
            <h1><i class="fas fa-chart-line"></i>稳赢量化交易系统</h1>
            <p>智能量化投资分析平台</p>
        </div>

        <div class="auth-card">
            <!-- Tab 切换 -->
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchAuthTab('login')">登录</div>
                <div class="auth-tab" onclick="switchAuthTab('register')">注册</div>
            </div>

            <!-- Flash 消息 -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                <div class="alert-box alert-{{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- 登录表单 -->
            <form class="auth-form active" id="login-form" method="POST" action="/auth/login">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
            </form>

            <!-- 注册表单 -->
            <form class="auth-form" id="register-form" method="POST" action="/auth/register">
                <div class="form-group">
                    <label>用户名 <span style="color:var(--red)">*</span></label>
                    <input type="text" name="username" placeholder="3-20 个字符，支持中英文和数字" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>邮箱 <span style="color:var(--text-secondary);font-weight:400;">(选填)</span></label>
                    <input type="email" name="email" placeholder="用于找回密码" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>密码 <span style="color:var(--red)">*</span></label>
                    <input type="password" name="password" placeholder="至少 6 个字符" autocomplete="new-password" required>
                </div>
                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> 注册
                </button>
            </form>
        </div>

        <div class="auth-footer">
            稳赢量化 &copy; 2026 · 投资有风险，入市需谨慎
        </div>
    </div>

    <script>
        // Tab 切换
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'register') {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            }
        }
        // 服务端指定 tab
        {% if tab is defined and tab == 'register' %}
        switchAuthTab('register');
        {% endif %}
    </script>
</body>
</html>
