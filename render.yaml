services:
  - type: web
    name: quantx-trading
    runtime: docker
    dockerfilePath: Dockerfile
    plan: starter
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "false"
      - key: QUANTX_DATA_DIR
        value: /app/data
